name: Build and Publish Container Image

on:
    push:
        branches:
            - "main"
            - "renovate/**"
        paths-ignore:
            - "**.md"
            - ".github/workflows/renovate.json5"
    schedule:
        - cron: "25 6 * * 0" # At 06:25 on every Sunday.
    workflow_dispatch:

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build-and-push-image:
        name: Build and Push Image to Registry
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout repo
              uses: actions/checkout@v7
              with:
                  submodules: recursive

            - name: Force permissions fix
              run: sudo apt-get update && sudo apt-get install dos2unix -y && cd ./container && bash dos2unix.sh

            - name: Login to Github registry
              uses: docker/login-action@v4
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Build amd64 (from Containerfile)
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Containerfile
                  platforms: linux/amd64
                  push: true
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.sha }}

            - name: Build arm64 packages
              run: |
                  docker buildx build \
                    -o proxmox-backup-arm64/packages \
                    --build-arg buildoptions="cross github client" \
                    --build-arg baseimage=debian:trixie-slim \
                    --platform linux/amd64 \
                    -f proxmox-backup-arm64/.github/Dockerfile.crosscompile-arm64 \
                    proxmox-backup-arm64

            - name: Build arm64 (from Containerfile.arm64)
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Containerfile.arm64
                  platforms: linux/arm64
                  push: true
                  tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.sha }}

            - name: Create and push multi-arch manifest
              run: |
                  docker buildx imagetools create \
                    -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
                    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:amd64-${{ github.sha }} \
                    ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:arm64-${{ github.sha }}
